<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Studio - MiMO TTS</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0d13;z-index:9999;transition:opacity .3s}
    #loading .dot{width:8px;height:8px;border-radius:50%;background:#6c8aff;margin:0 4px;animation:pulse 1.2s ease-in-out infinite}
    #loading .dot:nth-child(2){animation-delay:.2s}
    #loading .dot:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
  </style>
</head>
<body>
  <div id="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div id="app"></div>
  <script src="./vue.min.js"></script>
  <script src="./vue-router.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
